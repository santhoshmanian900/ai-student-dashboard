<!DOCTYPE html>
<html>

<head>
<title>AI Student Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
}

nav{
background:#020617;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
font-size:18px;
}

nav a{
color:white;
text-decoration:none;
}

nav a:hover{
color:#38bdf8;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.section{
margin-top:60px;
background:#020617;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
}

input, select{
padding:8px;
margin:5px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
background:#38bdf8;
border:none;
border-radius:5px;
}

button:hover{
background:#0ea5e9;
}

table{
margin:auto;
margin-top:20px;
}

th,td{
padding:10px;
}

#gpa-result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

#response{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<nav>

<a href="#ai">AI Tutor</a>
<a href="#gpa">GPA Calculator</a>

</nav>


<div class="container">

<h1>Student Dashboard</h1>


<div class="section" id="ai">

<h2>AI Tutor</h2>

<input id="question" placeholder="Ask a question">

<button onclick="askAI()">Ask</button>

<div id="response"></div>

</div>


<div class="section" id="gpa">

<h2>Weighted GPA Calculator</h2>

<table id="gpa-table">

<tr>
<th>Class</th>
<th>Grade</th>
<th>Level</th>
<th>Credits</th>
</tr>

<tr>
<td>Class 1</td>

<td>
<select class="grade">
<option>A</option>
<option>A-</option>
<option>B+</option>
<option>B</option>
<option>B-</option>
<option>C+</option>
<option>C</option>
<option>C-</option>
<option>D</option>
<option>F</option>
</select>
</td>

<td>
<select class="level">
<option value="0">On Level</option>
<option value="0.5">Advanced / Honors</option>
<option value="1">AP</option>
</select>
</td>

<td>
<input class="credit" value="1">
</td>

</tr>

</table>

<button onclick="addClass()">Add Class</button>

<button onclick="calculateGPA()">Calculate GPA</button>

<div id="gpa-result"></div>

</div>


</div>



<script>

async function askAI(){

const question = document.getElementById("question").value

document.getElementById("response").innerText="Thinking..."

const response = await fetch("PASTE_YOUR_NGROK_URL_HERE/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({question:question})

})

const data = await response.json()

document.getElementById("response").innerText=data.answer

}



let classCount = 1


function addClass(){

classCount++

const table=document.getElementById("gpa-table")

const row=table.insertRow()

row.innerHTML=`
<td>Class ${classCount}</td>

<td>
<select class="grade">
<option>A</option>
<option>A-</option>
<option>B+</option>
<option>B</option>
<option>B-</option>
<option>C+</option>
<option>C</option>
<option>C-</option>
<option>D</option>
<option>F</option>
</select>
</td>

<td>
<select class="level">
<option value="0">On Level</option>
<option value="0.5">Advanced / Honors</option>
<option value="1">AP</option>
</select>
</td>

<td>
<input class="credit" value="1">
</td>
`

}



function convertGrade(letter){

const scale={
"A":4.0,
"A-":3.7,
"B+":3.3,
"B":3.0,
"B-":2.7,
"C+":2.3,
"C":2.0,
"C-":1.7,
"D":1.0,
"F":0
}

return scale[letter]||0

}



function calculateGPA(){

const grades=document.querySelectorAll(".grade")
const credits=document.querySelectorAll(".credit")
const levels=document.querySelectorAll(".level")

let totalPoints=0
let totalCredits=0

for(let i=0;i<grades.length;i++){

let baseGrade=convertGrade(grades[i].value)

let weight=parseFloat(levels[i].value)

let credit=parseFloat(credits[i].value)||0

let weightedGrade=baseGrade+weight

totalPoints+=weightedGrade*credit

totalCredits+=credit

}

let gpa=totalPoints/totalCredits

document.getElementById("gpa-result").innerText=
"GPA: "+gpa.toFixed(2)

}

</script>


</body>
</html>
